{{/* Use site param `params.promptwatch.projectId` with a safe default */}}
{{ $projectID := site.Params.promptwatch.projectId | default "ab415e83-1a84-4508-ab98-efd861517895" }}
<script>
(function() {
  var script = document.createElement('script');
  script.setAttribute('data-project-id', {{ $projectID | jsonify }});
  script.src = 'https://ingest.promptwatch.com/js/client.min.js';
  document.head.appendChild(script);
})();
</script>
