<!-- JS: assets/js/docs/sidebar.js -->

<header class="flex flex-col docs-font gap-4 mb-8">
  <div class="flex items-start gap-2">

    <!-- Mobile sidebar toggle -->
    <button id="docs-sidebar-open" class="lg:hidden w-7 h-7 shrink-0 flex items-center justify-center border border-neutral-200 rounded-lg text-neutral-700 hover:bg-neutral-100">
      <span class="w-4 h-4">{{ partial "icon.html" "ri/menu-line" }}</span>
    </button>

    <!-- Breadcrumbs -->
    <nav class="flex items-center flex-wrap gap-1 text-sm text-neutral-400">
      {{ range .Ancestors.Reverse }}
        {{ if and (ne .Kind "home") (ne .RelPermalink "/docs/") }}
          <span class="inline-flex items-center gap-1">
            <a href="{{ .RelPermalink }}" class="hover:text-primary-500 transition-colors">
              {{ .Title }}
            </a>
            <span class="w-3 h-3 flex items-center justify-center">
              {{ partial "icon.html" "ri/corner-down-right-line" }}
            </span>
          </span>
        {{ end }}
      {{ end }}
      <span class="text-neutral-900 font-medium">{{ .Title }}</span>
    </nav>

  </div>
</header>
