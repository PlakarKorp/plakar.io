<!-- JS: assets/js/bundle/demo-modal.js -->

<div id="demo-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-neutral-900/60 p-4">
  <div id="demo-modal-box" class="bg-neutral-50 rounded-lg p-6 w-full max-w-xl shadow-xl flex flex-col gap-6 relative">

    <!-- Close button -->
    <button id="demo-modal-close" class="absolute top-4 right-4 w-7 h-7 flex items-center justify-center border border-neutral-200 rounded-lg text-neutral-500 hover:text-neutral-900 transition">
      <span class="w-4 h-4">{{ partial "icon.html" "ri/close-line" }}</span>
    </button>

    <!-- Title -->
    <div class="flex flex-col gap-1">
      <h2 class="text-2xl lg:text-4xl font-medium text-neutral-900">Book a demo</h2>
      <p class="text-sm text-neutral-600">A Plakar team member will contact you shortly to organize the demo.</p>
    </div>

    <!-- Form -->
    <form id="demo-form" class="flex flex-col gap-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input type="text" name="first_name" placeholder="First Name" required class="w-full border border-neutral-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">
        <input type="text" name="last_name" placeholder="Last Name" required class="w-full border border-neutral-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400">
        <input type="email" name="email" placeholder="Work email" required class="w-full border border-neutral-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 md:col-span-2">
        <textarea name="context" placeholder="Context (optional)" class="w-full border border-neutral-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 md:col-span-2 h-24 resize-none"></textarea>
      </div>

      <div id="demo-form-error" class="hidden text-sm text-red-500"></div>
      <div id="demo-form-success" class="hidden text-sm text-green-600">Your request has been submitted successfully.</div>

      <div class="flex flex-col items-end justify-between gap-4 mt-2">
        <p class="text-xs text-neutral-400">
          By submitting you agree to our
          <a href="/privacy-policy/" class="text-primary-500 hover:underline">Privacy Policy</a>.
        </p>
        <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-neutral-50 px-6 py-2 rounded-lg text-sm font-medium transition shrink-0">
          Submit
        </button>
      </div>
    </form>

  </div>
</div>
